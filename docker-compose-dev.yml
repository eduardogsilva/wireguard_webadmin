version: '3'
services:
  wireguard-webadmin:
    container_name: wireguard-webadmin
    restart: unless-stopped
    build:
      context: .
    environment:
      - SERVER_ADDRESS=${SERVER_ADDRESS}
      - DEBUG_MODE=${DEBUG_MODE}
      - DEV_MODE=True
      - COMPOSE_VERSION=c2g
      - TZ=${TIMEZONE}
      - EXTRA_ALLOWED_HOSTS=${EXTRA_ALLOWED_HOSTS}
      - WIREGUARD_STATUS_CACHE_ENABLED=${WIREGUARD_STATUS_CACHE_ENABLED}
      - WIREGUARD_STATUS_CACHE_WEB_LOAD_PREVIOUS_COUNT=${WIREGUARD_STATUS_CACHE_WEB_LOAD_PREVIOUS_COUNT}
      - WIREGUARD_STATUS_CACHE_REFRESH_INTERVAL=${WIREGUARD_STATUS_CACHE_REFRESH_INTERVAL}
      - VPN_CLIENTS_CAN_ACCESS_DJANGO=${VPN_CLIENTS_CAN_ACCESS_DJANGO}
      - WIREGUARD_MTU=${WIREGUARD_MTU}
      - CADDY_ENABLED=true
    volumes:
      - wireguard:/etc/wireguard
      - static_volume:/app_static_files/
      - .:/app
      - dnsmasq_conf:/etc/dnsmasq
      - app_secrets:/app_secrets/
      - rrd_data:/rrd_data/
      - caddy_json_export:/caddy_json_export/
    ports:
      # Do not directly expose the Django port to the internet, use some kind of reverse proxy with SSL.
      - "8000:8000"
      # Caddy ports — declared here because wireguard-webadmin-caddy shares this network namespace
      - "80:80"
      - "443:443"
      # Warning: Docker will have a hard time handling large amount of ports. Expose only the ports that you need.
      # Ports for multiple WireGuard instances. (Probably, you just need one)
      - "51820-51839:51820-51839/udp"
      # Ports for port forwarding rules. Add your own ports here if you need them.
      - "8080-8089:8080-8089/tcp"

    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    command: /bin/bash /app/init.sh

  wireguard-webadmin-cron:
    container_name: wireguard-webadmin-cron
    restart: unless-stopped
    build:
      context: containers/cron
      dockerfile: Dockerfile-cron
    environment:
      - TZ=${TIMEZONE}
      - WIREGUARD_STATUS_CACHE_REFRESH_INTERVAL=${WIREGUARD_STATUS_CACHE_REFRESH_INTERVAL}
    volumes:
      - app_secrets:/app_secrets/
    depends_on:
      - wireguard-webadmin

  wireguard-webadmin-rrdtool:
    container_name: wireguard-webadmin-rrdtool
    restart: unless-stopped
    build:
      context: ./containers/rrdtool
      dockerfile: Dockerfile-rrdtool
    volumes:
      - app_secrets:/app_secrets/
      - rrd_data:/rrd_data/
    environment:
      - TZ=${TIMEZONE}
    depends_on:
      - wireguard-webadmin

  wireguard-webadmin-dns:
    container_name: wireguard-webadmin-dns
    restart: unless-stopped
    build:
      context: ./containers/dnsmasq
      dockerfile: Dockerfile-dnsmasq
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - dnsmasq_conf:/etc/dnsmasq/

  wireguard-webadmin-caddy:
    container_name: wireguard-webadmin-caddy
    restart: unless-stopped
    build:
      context: ./containers/caddy
      dockerfile: Dockerfile-caddy
    environment:
      - SERVER_ADDRESS=${SERVER_ADDRESS}
      - EXTRA_ALLOWED_HOSTS=${EXTRA_ALLOWED_HOSTS}
      - TZ=${TIMEZONE}
    volumes:
      - static_volume:/static
      - caddy_json_export:/caddy_json_export
      - caddy_data:/data
      - caddy_config:/config
    network_mode: "service:wireguard-webadmin"
    depends_on:
      - wireguard-webadmin
      - wireguard-webadmin-auth-gateway

  wireguard-webadmin-auth-gateway:
    container_name: wireguard-webadmin-auth-gateway
    restart: unless-stopped
    build:
      context: ./containers/auth-gateway
      dockerfile: Dockerfile-auth-gateway
    environment:
      - TZ=${TIMEZONE}
      - AUTH_GATEWAY_CONFIG_DIR=/caddy_json_export
      - AUTH_GATEWAY_DATABASE_PATH=/data/auth-gateway.sqlite3
      - AUTH_GATEWAY_SECURE_COOKIES=false
    volumes:
      - caddy_json_export:/caddy_json_export
      - auth_gateway_data:/data
    depends_on:
      - wireguard-webadmin

volumes:
  static_volume:
  wireguard:
  dnsmasq_conf:
  app_secrets:
  rrd_data:
  caddy_json_export:
  auth_gateway_data:
  caddy_data:
  caddy_config:
